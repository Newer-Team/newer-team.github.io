<!DOCTYPE html>
<html>
<head>
	<script>
	supportedLangs = ["en", "fr"];
	
    document.addEventListener("DOMContentLoaded", () => {
		var lang = navigator.language; // e.g. "en-US"
		var langCode = lang.slice(0, 2); // first two letters (e.g. "en")
		
		if (!supportedLangs.includes(langCode)) {
			langCode = "en";
		}

		var savedLang = localStorage.getItem("lang");
		if (savedLang && supportedLangs.includes(savedLang)) {
			langCode = savedLang;
		}
		
		window.location.replace("/" + langCode + "/hol/index.html");
    });
	</script>
</head>
</html>
